<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Add Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-100" style="font-family: 'Inter', sans-serif;">

<main class="max-w-3xl mx-auto px-4 py-12">
    <div class="bg-white rounded-3xl shadow-md p-8 border-t-8 border-blue-600">
        <h1 class="text-3xl font-bold text-gray-900 mb-6">Add New Project</h1>

        <form action="/admin/add" method="POST" class="space-y-6">

            <div class="bg-red-50 p-4 rounded-xl border border-red-100">
                <label class="block text-sm font-bold text-red-800 mb-1">Admin Password *</label>
                <input type="password" name="secret_password" required class="w-full px-4 py-2 border border-red-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Project Title *</label>
                <input type="text" name="title" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Short Description (Card preview) *</label>
                <textarea name="description" rows="3" required class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Long Description</label>
                <textarea name="long_description" rows="8" class="w-full px-4 py-2 border border-gray-300 rounded-lg font-mono text-sm"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Main Image Path *</label>
                    <input type="text" name="image" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Technologies (comma separated) *</label>
                    <input type="text" name="technologies"  required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Additional Screenshots (comma separated, optional)</label>
                <input type="text" name="screenshots" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">GitHub URL *</label>
                    <input type="text" name="github" required class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Live Demo URL (Optional)</label>
                    <input type="text" name="live_url" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-blue-700 transition-colors mt-4">
                Add Project to Portfolio
            </button>
        </form>

        <a href="/projects" class="block text-center mt-6 text-gray-500 hover:text-blue-600 text-sm">Cancel and go back</a>
    </div>
</main>

</body>
</html>
