<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Patryk Jóźwiak</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50" style="font-family: 'Inter', sans-serif;">

<nav class="bg-white shadow-sm mb-8">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
    <a href="/" class="font-bold text-xl text-gray-900">pjozwiak.dev</a>
    <div class="flex gap-6">
      <a href="/" class="text-gray-600 hover:text-blue-600 font-medium">Main Page</a>
      <a href="/projects" class="text-blue-600 font-medium">Projects</a>
      <a href="/contact" class="text-gray-600 hover:text-blue-600 font-medium">Contact</a>
    </div>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="mb-8">
    <h1 class="text-4xl md:text-5xl font-bold text-gray-900 mb-4">
      My Projects
    </h1>
    <p class="text-lg text-gray-600">
      A collection of my personal projects
    </p>
  </div>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

    {{#projects}}
    <div class="bg-white rounded-3xl shadow-sm overflow-hidden hover:shadow-md transition-shadow flex flex-col">

      <div class="h-48 overflow-hidden bg-gray-100">
        <img src="{{image}}" alt="{{title}}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300">
      </div>

      <div class="p-6 flex-1 flex flex-col">
        <h3 class="text-xl font-bold text-gray-900 mb-3">
          {{title}}
        </h3>

        <p class="text-gray-700 mb-6 leading-relaxed flex-1">
          {{description}}
        </p>

        <div class="flex flex-wrap gap-2 mb-6">
          {{#technologies}}
          <span class="px-3 py-1 bg-blue-50 text-blue-700 rounded-lg text-xs font-medium border border-blue-200">
              {{name}}
          </span>
          {{/technologies}}
        </div>

        <div class="mt-auto space-y-4">

          <a href="/project/{{id}}" class="group flex items-center justify-between w-full text-blue-600 hover:text-blue-700 font-semibold transition-colors">
            <span>View Project Details</span>
            <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
          </a>

          <div class="flex gap-3 pt-4 border-t border-gray-100">
            <a href="{{githubUrl}}" target="_blank" rel="noopener noreferrer" class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 transition-colors font-medium text-sm">
              <i data-lucide="github" class="w-4 h-4"></i>
              View Code
            </a>

            {{#liveUrl}}
            <a href="{{liveUrl}}" target="_blank" rel="noopener noreferrer" class="flex-1 inline-flex items-center justify-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium text-sm">
              <i data-lucide="external-link" class="w-4 h-4"></i>
              Live Demo
            </a>
            {{/liveUrl}}
          </div>

        </div>
      </div>
    </div>
    {{/projects}}
  </div>
</main>

<script>
  lucide.createIcons();
</script>
</body>
</html>
