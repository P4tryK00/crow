<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patryk Jóźwiak - Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-light">

<div class="container mt-5 mb-5">

    <div class="row align-items-center bg-white p-5 shadow-sm rounded-4 mb-5">
        <div class="col-md-4 d-flex justify-content-center align-items-center mb-4 mb-md-0">
            <img src="/static/myphoto.png" alt="Profile Picture" class="shadow" style="width: 220px; height: 220px; object-fit: cover; border-radius: 50%;">
        </div>

        <div class="col-md-8">
            <h1 class="display-5 fw-bold text-dark mb-1">Patryk Jóźwiak</h1>
            <h2 class="text-secondary fs-4 mb-4">Aspiring Software Engineer / C++ Developer</h2>

            <p class="lead text-muted mb-4">
                Hi! I'm learning to write efficient C++ code, and this is my custom web server built with the Crow framework.
            </p>

            <div class="d-flex gap-3 flex-wrap">
                <a href="/contact" class="btn btn-primary px-4 py-2 fw-semibold">Contact Me</a>
                <a href="https://www.linkedin.com/in/patryk-jóźwiak-7711b7306/" target="_blank" class="btn btn-outline-primary px-4 py-2 fw-semibold">LinkedIn</a>
                <a href="https://github.com/TwojNick" target="_blank" class="btn btn-outline-dark px-4 py-2 fw-semibold">GitHub</a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <h3 class="fw-bold mb-4 text-dark">
                My Projects <span class="badge bg-secondary fs-6 align-middle">{{project_count}}</span>
            </h3>

            <div class="row">
                {{#projects}}
                <div class="col-md-6 mb-4">
                    <div class="card h-100 shadow-sm border-0 rounded-4">
                        <div class="card-body p-4">
                            <h4 class="card-title fw-bold text-dark">{{name}}</h4>
                            <p class="card-text text-muted">{{description}}</p>
                        </div>
                    </div>
                </div>
                {{/projects}}
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
